services:
  - type: web
    name: smart-schedule
    runtime: python
    buildCommand: pip install -r requirements_web.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATA_DIR
        value: /opt/render/project/src/data_storage
    disk:
      name: data
      mountPath: /opt/render/project/src/data_storage
      sizeGB: 1
