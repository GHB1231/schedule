<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能日程安排表</title>

    <!-- FullCalendar v6 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>

    <!-- 样式 -->
    <link rel="stylesheet" href="css/style.css">

    <!-- API 适配层 -->
    <script src="js/api.js"></script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="top-bar">
        <div class="brand">
            <span class="brand-icon">📅</span>
            <h1>智能日程安排表</h1>
        </div>
        <div class="header-stats" id="headerStats">
            <span class="stat-item" id="statAccuracy">解析准确率: --</span>
            <span class="stat-item" id="statSamples">样本数: --</span>
            <button class="btn btn-sm btn-secondary" onclick="doLogout()" style="margin-left:8px;">退出</button>
        </div>
    </header>

    <!-- 主体区域 -->
    <div class="main-container">
        <!-- 左侧面板 -->
        <aside class="side-panel" id="sidePanel">
            <!-- 快捷输入区 -->
            <div class="panel-section input-section">
                <div class="section-title">✏️ 快捷输入</div>
                <textarea
                    id="quickInput"
                    class="quick-input"
                    placeholder="输入日程，AI 自动识别...
例如：下周三下午3点参加腾讯线上笔试"
                    rows="3"
                ></textarea>
                <div class="input-actions">
                    <button id="btnAdd" class="btn btn-primary" onclick="handleAddEvent()">
                        🚀 智能添加
                    </button>
                    <button id="btnManualAdd" class="btn btn-secondary" onclick="showManualForm()">
                        📝 手动添加
                    </button>
                </div>
                <div id="parseStatus" class="parse-status"></div>
            </div>

            <!-- 校招信息面板 -->
            <div class="panel-section job-section">
                <div class="section-title">
                    🎯 校招动态
                    <button class="btn-icon" onclick="refreshJobPanel()" title="刷新缓存">🔄</button>
                </div>
                <div class="job-search-box">
                    <input type="text" id="jobSearchInput" class="job-search-input"
                           placeholder="搜企业: 国家电网、腾讯..."
                           onkeydown="if(event.key==='Enter')searchSpecificCompany()">
                    <button class="btn btn-sm btn-primary" onclick="searchSpecificCompany()">搜索</button>
                </div>
                <div id="jobList" class="job-list">
                    <div class="empty-hint">输入求职相关内容自动搜索<br>或在上方搜索框输入企业名</div>
                </div>
            </div>

            <!-- 学习统计 -->
            <div class="panel-section stats-section">
                <div class="section-title">📊 学习统计</div>
                <div id="learningStats" class="learning-stats">
                    <div class="stat-row"><span>总样本数</span><span id="lTotal">0</span></div>
                    <div class="stat-row"><span>修正次数</span><span id="lCorrected">0</span></div>
                    <div class="stat-row"><span>解析准确率</span><span id="lAccuracy">0%</span></div>
                </div>
            </div>
        </aside>

        <!-- 中央日历 -->
        <main class="calendar-main">
            <div id="calendar"></div>
        </main>
    </div>

    <!-- 事件编辑弹窗 -->
    <div id="eventModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">编辑事件</h2>
                <button class="btn-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>标题</label>
                    <input type="text" id="evTitle" class="form-input" placeholder="事件标题">
                </div>
                <div class="form-group">
                    <label>类型</label>
                    <select id="evType" class="form-input">
                        <option value="task">📋 任务</option>
                        <option value="meeting">🤝 会议</option>
                        <option value="reminder">🔔 提醒</option>
                        <option value="job_search">🎯 求职</option>
                        <option value="learning">📚 学习</option>
                        <option value="other">📌 其他</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>开始时间</label>
                        <input type="datetime-local" id="evStart" class="form-input">
                    </div>
                    <div class="form-group">
                        <label>结束时间</label>
                        <input type="datetime-local" id="evEnd" class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label>地点</label>
                    <input type="text" id="evLocation" class="form-input" placeholder="可选">
                </div>
                <div class="form-group">
                    <label>描述</label>
                    <textarea id="evDescription" class="form-input" rows="2" placeholder="可选"></textarea>
                </div>
                <div class="form-group">
                    <label>优先级</label>
                    <select id="evPriority" class="form-input">
                        <option value="0">无</option>
                        <option value="1">低</option>
                        <option value="2">中</option>
                        <option value="3">高</option>
                    </select>
                </div>
                <input type="hidden" id="evId">
                <input type="hidden" id="evSampleId">
            </div>
            <div class="modal-footer">
                <button class="btn btn-danger" id="btnDelete" onclick="handleDeleteEvent()">🗑 删除</button>
                <div class="modal-actions-right">
                    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="handleSaveEvent()">💾 保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 校招详情弹窗 -->
    <div id="jobModal" class="modal-overlay" style="display:none;">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h2 id="jobModalTitle">校招详情</h2>
                <button class="btn-close" onclick="closeJobModal()">✕</button>
            </div>
            <div class="modal-body" id="jobModalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeJobModal()">关闭</button>
                <button class="btn btn-primary" id="btnJobApplied">✅ 标记已投递</button>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script>
        async function doLogout(){await fetch('/logout',{method:'POST'});window.location.href='/login.html';}
        fetch('/api/check_auth').then(r=>r.json()).then(d=>{if(!d.logged_in)window.location.href='/login.html';});
    </script>
    <script src="js/app.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/input.js"></script>
    <script src="js/job-panel.js"></script>
</body>
</html>
